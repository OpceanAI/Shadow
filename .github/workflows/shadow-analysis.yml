name: Shadow Self-Analysis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  shadow-analysis:
    name: Shadow Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Shadow Info
        run: node dist/index.js info --json > shadow-info.json
        continue-on-error: true

      - name: Run Shadow Lint
        run: node dist/index.js lint --json > shadow-lint.json
        continue-on-error: true

      - name: Run Shadow Security
        run: node dist/index.js security --json > shadow-security.json
        continue-on-error: true

      - name: Run Shadow Metrics
        run: node dist/index.js metrics --json > shadow-metrics.json
        continue-on-error: true

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let info, lint, security, metrics;
            try { info = JSON.parse(fs.readFileSync('shadow-info.json', 'utf8')); } catch (e) { info = { error: e.message }; }
            try { lint = JSON.parse(fs.readFileSync('shadow-lint.json', 'utf8')); } catch (e) { lint = { error: e.message }; }
            try { security = JSON.parse(fs.readFileSync('shadow-security.json', 'utf8')); } catch (e) { security = { error: e.message }; }
            try { metrics = JSON.parse(fs.readFileSync('shadow-metrics.json', 'utf8')); } catch (e) { metrics = { error: e.message }; }

            const body = `## 🔍 Shadow Self-Analysis

            ### 📊 Project Info
            \`\`\`json
            ${JSON.stringify(info, null, 2)}
            \`\`\`

            ### 🔒 Security Scan
            \`\`\`json
            ${JSON.stringify(security, null, 2)}
            \`\`\`

            ### 📐 Code Metrics
            \`\`\`json
            ${JSON.stringify(metrics, null, 2)}
            \`\`\`

            > Auto-generated by Shadow CLI on every PR.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
